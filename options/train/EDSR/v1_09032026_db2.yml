# network structures
network_g:
  type: EDSR
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 8
  upscale: 4
  num_heads: 8
  hw: 8
  ww: 8
  wavelet: 'db2'
  img_range: 255.
  rgb_mean: [0.467809, 0.448499, 0.403531]

# path
path:
  pretrain_network_g:
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [100000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: 1000
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: v1_09032026_f64_b8_h8_8x8_b4a4_x4_db2
    resume_id: dpj8y0hw

# dist training settings
dist_params:
  backend: nccl
  port: 29500
