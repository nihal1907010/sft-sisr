# network structures
network_g:
  type: EDSR
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 96
  num_block: 12
  upscale: 4
  num_heads: 6
  hw: 8
  ww: 8
  img_range: 255.
  rgb_mean: [0.467809, 0.448499, 0.403531]

# path
path:
  pretrain_network_g: experiments/final_x2/models/net_g_350000.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-4     # good starting point
    betas: [0.9, 0.99]   # same as you used
    weight_decay: 0.01   # typical for transformers (0.01–0.05)
    eps: !!float 1e-8

  scheduler:
    type: MultiStepLR
    milestones: [200000, 400000, 600000, 800000]
    gamma: 0.5

  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: CombinedSRLoss
    # weights of each term
    w_charb: 1.0
    w_ssim: 0.2
    w_wavelet: 0.5
    w_perceptual: 0.01
    w_tv: 1.0e-6
    # SSIM options
    ssim_on_y: true          # SSIM on luminance (recommended)
    ssim_window_size: 11
    ssim_sigma: 1.5
    # Wavelet options (LH, HL, HH)
    wavelet_weights: [1.0, 1.0, 1.0]
    wavelet_p: 1             # 1=L1, 2=L2 on subbands
    # Perceptual (VGG) options
    vgg_layer: relu3_1
    vgg_use_pretrained: true # ensure torchvision can load weights
    vgg_input_range: [0.0, 1.0]
    vgg_normalize: true

# validation settings
val:
  val_freq: 1000
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: final_x2_x4
    resume_id: ejtv7nn9

# dist training settings
dist_params:
  backend: nccl
  port: 29500
