# general settings
name: final_x2_x4
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: datasets/Train/DF2K/HR_sub
    dataroot_lq: datasets/Train/DF2K/LRx4_sub
    # (for lmdb)
    # dataroot_gt: datasets/DIV2K/DIV2K_train_HR_sub.lmdb
    # dataroot_lq: datasets/DIV2K/DIV2K_train_LR_bicubic_X4_sub.lmdb
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # (for lmdb)
      # type: lmdb

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 16
    batch_size_per_gpu: 3
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true
    num_accumulation_steps: 4

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/Test/Set5/HR
    dataroot_lq: datasets/Test/Set5/LRx4
    io_backend:
      type: disk

