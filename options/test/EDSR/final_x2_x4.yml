name: thesis_test
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 10

datasets:
#   test_1:
#     name: Set5
#     type: SingleImageDataset
#     dataroot_lq: datasets/Test/Set5/LRx4
#     io_backend:
#       type: disk

  test_2:
    name: Custom
    type: PairedImageDataset
    dataroot_gt: datasets/sr_down/HR
    dataroot_lq: datasets/sr_down/x4
    io_backend:
      type: disk

# network structures
network_g:
  type: EDSR
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 192
  num_block: 6
  upscale: 4
  num_heads: 6
  hw: 8
  ww: 8
  img_range: 255.
  rgb_mean: [0.4488, 0.4371, 0.4040]

# path
path:
  pretrain_network_g: experiments/EDSR_Lx4_f192b6_DF2K_500k_B8G1_001/models/net_g_latest.pth
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: thesis_test  # add suffix to saved images, if None, use exp name

  # no metrics since GT is not available
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
