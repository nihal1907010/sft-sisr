name: main
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 10

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/Test/Set5/HR
    dataroot_lq: datasets/Test/Set5/LRx4
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: datasets/Test/Set14/HR
    dataroot_lq: datasets/Test/Set14/LRx4
    io_backend:
      type: disk

  test_3:
    name: B100
    type: PairedImageDataset
    dataroot_gt: datasets/Test/B100/HR
    dataroot_lq: datasets/Test/B100/LRx4
    io_backend:
      type: disk

  test_4:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: datasets/Test/Manga109/HR
    dataroot_lq: datasets/Test/Manga109/LRx4
    io_backend:
      type: disk

  test_5:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: datasets/Test/Urban100/HR
    dataroot_lq: datasets/Test/Urban100/LRx4
    io_backend:
      type: disk

# network structures
network_g:
  type: EDSR
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 192
  num_block: 6
  upscale: 4
  num_heads: 6
  hw: 8
  ww: 8
  img_range: 255.
  rgb_mean: [0.4488, 0.4371, 0.4040]

# path
path:
  pretrain_network_g: experiments/pretrained_models/main.pth
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: main  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
